<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJPLUS AI — Agents</title>
<style>
  :root{
    --bg:#0B0E1A; --bg-card:#141A2E; --border:#232B45;
    --text:#F1F5F9; --text-dim:#8B93A7;
    --blue:#2F7BFF; --green:#22C55E; --purple:#8B5CF6; --gold:#F5A623; --red:#EF4444;
    --sidebar-w:230px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text);}
  a{color:inherit; text-decoration:none;}

  .sidebar{position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-w); background:#0E1326; border-right:1px solid var(--border); padding:20px 14px; display:flex; flex-direction:column; overflow-y:auto; z-index:10;}
  .logo-row{display:flex; align-items:center; gap:10px; padding:0 6px 18px;}
  .logo-mark{width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--blue),var(--purple)); display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff;}
  .logo-text h1{font-size:15px; font-weight:800;}
  .logo-text p{font-size:9px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase;}
  .nav-item{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; font-size:13.5px; color:var(--text-dim); margin-bottom:2px; cursor:pointer;}
  .nav-item:hover{background:#1A2240; color:var(--text);}
  .nav-item.active{background:var(--blue); color:#fff; font-weight:600;}
  .nav-item.soon{opacity:.4; cursor:default;}
  .nav-section-label{font-size:10px; letter-spacing:1px; color:#4B5572; text-transform:uppercase; margin:18px 0 6px 12px;}
  .sidebar-footer{margin-top:auto; padding-top:14px; border-top:1px solid var(--border);}
  #logoutBtn{width:100%; padding:10px; border-radius:10px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-size:13px; cursor:pointer;}
  #logoutBtn:hover{border-color:var(--red); color:var(--red);}

  .main{margin-left:var(--sidebar-w); padding:22px 26px; min-height:100vh;}
  .page-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;}
  .page-head h2{font-size:20px;}
  .btn-primary{background:var(--green); color:#06210f; border:none; padding:10px 16px; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer;}
  .btn-secondary{background:transparent; color:var(--text-dim); border:1px solid var(--border); padding:10px 16px; border-radius:10px; font-size:13px; cursor:pointer;}

  .agent-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px;}
  .agent-card{background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:18px;}
  .agent-card .top{display:flex; justify-content:space-between; align-items:flex-start;}
  .agent-card h4{font-size:15px; margin-bottom:4px;}
  .badge{font-size:10px; padding:3px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.5px; font-weight:700;}
  .badge.sales{background:rgba(47,123,255,.15); color:var(--blue);}
  .badge.support{background:rgba(34,197,94,.15); color:var(--green);}
  .badge.finance{background:rgba(245,166,35,.15); color:var(--gold);}
  .badge.marketing{background:rgba(139,92,246,.15); color:var(--purple);}
  .badge.analytics{background:rgba(239,68,68,.15); color:var(--red);}
  .agent-card p.desc{font-size:12.5px; color:var(--text-dim); margin:10px 0 14px; line-height:1.5;}
  .status-toggle{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-dim); cursor:pointer;}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .dot.online{background:var(--green);}
  .dot.offline{background:#475069;}
  .empty{color:var(--text-dim); font-size:13px; padding:30px; text-align:center; grid-column:1/-1;}

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:24px; width:100%; max-width:420px;}
  .modal h3{margin-bottom:16px; font-size:16px;}
  .modal label{display:block; font-size:12px; color:var(--text-dim); margin:12px 0 6px;}
  .modal input, .modal select, .modal textarea{width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:#0F1424; color:var(--text); font-size:13px;}
  .modal textarea{resize:vertical; min-height:70px; font-family:inherit;}
  .modal-actions{display:flex; gap:10px; margin-top:20px;}
  .modal-actions button{flex:1;}

  @media(max-width:720px){
    .sidebar{transform:translateX(-100%); transition:transform .2s;}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;}
    .menu-btn{display:inline-flex !important;}
  }
  .menu-btn{display:none; align-items:center; justify-content:center; width:36px; height:36px; border-radius:8px; background:var(--bg-card); border:1px solid var(--border); color:var(--text); font-size:16px; cursor:pointer;}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="logo-row">
    <div class="logo-mark">A</div>
    <div class="logo-text"><h1>AJPLUS AI</h1><p>Agent OS</p></div>
  </div>
  <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
  <a href="agents.html" class="nav-item active">🤖 Agents AI</a>
  <a href="conversations.html" class="nav-item">💬 Conversations</a>
  <div class="nav-section-label">Hivi Karibuni</div>
  <div class="nav-item soon">👥 Leads</div>
  <div class="nav-item soon">🏢 Clients</div>
  <div class="nav-item soon">✅ Tasks</div>
  <div class="nav-item soon">💳 Billing</div>
  <div class="sidebar-footer"><button id="logoutBtn">Toka (Logout)</button></div>
</aside>

<main class="main">
  <button class="menu-btn" id="menuBtn">☰</button>
  <div class="page-head">
    <h2>Agents AI</h2>
    <button class="btn-primary" id="newAgentBtn">+ Agent Mpya</button>
  </div>

  <div class="agent-grid" id="agentGrid">
    <div class="empty">Inapakia agents...</div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Unda Agent Mpya</h3>
    <form id="agentForm">
      <label>Jina la Agent</label>
      <input id="f_name" required placeholder="mfano: AJ Support Agent">

      <label>Aina (Type)</label>
      <select id="f_type" required>
        <option value="sales">Sales</option>
        <option value="support">Support</option>
        <option value="finance">Finance</option>
        <option value="marketing">Marketing</option>
        <option value="analytics">Analytics</option>
      </select>

      <label>Maelezo mafupi</label>
      <textarea id="f_description" placeholder="Agent hii inafanya kazi gani?"></textarea>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="cancelBtn">Ghairi</button>
        <button type="submit" class="btn-primary">Hifadhi</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  // 🔧 WEKA HAPA: Supabase URL na Anon Key
  const SUPABASE_URL = 'PASTE_SUPABASE_URL_HAPA';
  const SUPABASE_ANON_KEY = 'PASTE_ANON_KEY_HAPA';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('logoutBtn').onclick = async () => { await supabase.auth.signOut(); window.location.href = 'index.html'; };

  let companyId = null;

  function renderAgents(agents){
    const grid = document.getElementById('agentGrid');
    if (!agents || agents.length === 0){
      grid.innerHTML = '<div class="empty">Hakuna agent bado. Bonyeza "+ Agent Mpya" kuanza.</div>';
      return;
    }
    grid.innerHTML = agents.map(a => `
      <div class="agent-card">
        <div class="top">
          <div>
            <h4>${a.name}</h4>
            <span class="badge ${a.type}">${a.type}</span>
          </div>
        </div>
        <p class="desc">${a.description || 'Hakuna maelezo bado.'}</p>
        <div class="status-toggle" data-id="${a.agent_id}" data-status="${a.status}">
          <span class="dot ${a.status === 'online' ? 'online' : 'offline'}"></span>
          ${a.status === 'online' ? 'Online — bonyeza kuzima' : 'Offline — bonyeza kuwasha'}
        </div>
      </div>
    `).join('');

    grid.querySelectorAll('.status-toggle').forEach(el => {
      el.addEventListener('click', async () => {
        const id = el.dataset.id;
        const newStatus = el.dataset.status === 'online' ? 'offline' : 'online';
        await supabase.from('agents').update({ status: newStatus }).eq('agent_id', id);
        loadAgents();
      });
    });
  }

  async function loadAgents(){
    const { data } = await supabase.from('agents').select('*').eq('company_id', companyId).order('created_at', { ascending: false });
    renderAgents(data);
  }

  async function init(){
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }
    const { data: profile } = await supabase.from('users').select('company_id').eq('id', session.user.id).single();
    companyId = profile?.company_id;
    if (!companyId){
      document.getElementById('agentGrid').innerHTML = '<div class="empty">company_id haipatikani kwenye profile yako.</div>';
      return;
    }
    loadAgents();
  }

  const overlay = document.getElementById('modalOverlay');
  document.getElementById('newAgentBtn').onclick = () => overlay.classList.add('show');
  document.getElementById('cancelBtn').onclick = () => overlay.classList.remove('show');

  document.getElementById('agentForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('f_name').value.trim();
    const type = document.getElementById('f_type').value;
    const description = document.getElementById('f_description').value.trim();

    await supabase.from('agents').insert({
      company_id: companyId, name, type, description, status: 'online'
    });

    e.target.reset();
    overlay.classList.remove('show');
    loadAgents();
  });

  init();
</script>

</body>
</html>
